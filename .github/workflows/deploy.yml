name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: proteus-softworks
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Mix release
        run: nix develop --command build-release

      - name: Build and load runtime base image
        run: nix develop --command build-docker

      - name: Build final image with release
        run: |
          cat <<'EOF' > Dockerfile.prod
          FROM toolshed:latest
          COPY _build/prod/rel/toolshed /app
          EOF
          docker build -f Dockerfile.prod -t toolshed:final .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push
        run: |
          docker tag toolshed:final ghcr.io/${{ github.repository_owner }}/toolshed:latest
          docker tag toolshed:final ghcr.io/${{ github.repository_owner }}/toolshed:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/toolshed:latest
          docker push ghcr.io/${{ github.repository_owner }}/toolshed:${{ github.sha }}
